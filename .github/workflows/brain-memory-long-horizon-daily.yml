name: Brain Memory Long Horizon

on:
  schedule:
    # 09:00 UTC = 06:00 BRT
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: brain-memory-long-horizon-daily
  cancel-in-progress: false

jobs:
  check-memory-long-horizon:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      BRAIN_LH_AUTOINIT: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          if [ -z "${VITE_SUPABASE_URL:-}" ] || [ -z "${VITE_SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Missing VITE_SUPABASE_URL or VITE_SUPABASE_ANON_KEY repository secret."
            exit 1
          fi

      - name: Run long-horizon memory suite
        run: npm run check:brain:memory-long
