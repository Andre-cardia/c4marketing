name: Brain Memory Quality Audit

on:
  schedule:
    # Monday 09:30 UTC = 06:30 BRT
    - cron: "30 9 * * 1"
  workflow_dispatch:

concurrency:
  group: brain-memory-quality-audit-weekly
  cancel-in-progress: false

jobs:
  audit-memory-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      BRAIN_QUALITY_SAMPLE_SIZE: "8"
      BRAIN_QUALITY_STRICT: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          if [ -z "${VITE_SUPABASE_URL:-}" ] || [ -z "${VITE_SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Missing VITE_SUPABASE_URL or VITE_SUPABASE_ANON_KEY repository secret."
            exit 1
          fi

      - name: Run weekly quality audit
        run: npm run check:brain:memory-quality
